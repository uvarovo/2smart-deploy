name: Validate
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write a throwaway .env from .env.example
        run: |
          cp .env.example .env
          # Installers/validators fail on unset vars; give them placeholders.
          sed -i 's|CHANGE_ME_[a-zA-Z0-9_-]*|placeholder|g' .env
      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml --env-file .env config > /dev/null

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Only lint the scripts we maintain here. install_2smart.sh is a
      # verbatim copy from 2smart-standalone-composer upstream and keeps
      # its original SC2104 break-in-function idiom.
      - name: shellcheck update_2smart.sh
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck --severity=error update_2smart.sh

  tuya-bridge-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: node --check app.js
        run: node --check bridges-custom/tuya-bridge/app.js
      - name: node --check lib/*.js
        run: |
          for f in bridges-custom/tuya-bridge/lib/*.js; do
            echo "--- $f"
            node --check "$f"
          done
